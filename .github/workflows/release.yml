name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # ── 构建（Windows 单平台：外部小工具 + 主应用） ──
  build:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # 版本校验尽早执行，避免 tag 与配置不一致时白白编译
      - name: Check version matches tag
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CONFIG_VERSION=$(jq -r '.version' tauri-tail-maker/src-tauri/tauri.conf.json)
          if [ "$TAG_VERSION" != "$CONFIG_VERSION" ]; then
            echo "ERROR: Git tag 'v$TAG_VERSION' does not match tauri.conf.json version '$CONFIG_VERSION'"
            echo "Please update the version field in tauri.conf.json before pushing the tag."
            exit 1
          fi
          echo "Version check passed: tag=v$TAG_VERSION  config=$CONFIG_VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: tauri-tail-maker/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-pc-windows-msvc

      - name: Install npm dependencies
        working-directory: tauri-tail-maker
        run: npm ci

      # ---- 运行本地构建脚本 ----
      - name: Run production build script
        shell: pwsh
        run: ./run-build.ps1

      - name: Upload main app exe
        uses: actions/upload-artifact@v4
        with:
          name: main-app
          path: ./target/release/osu-mania-tail-maker.exe
          if-no-files-found: error

      - name: Upload external tool exe
        uses: actions/upload-artifact@v4
        with:
          name: external-tool
          path: ./target/release/osu-tail-maker-external.exe
          if-no-files-found: error

  # ── 创建 Release ───────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: main-app
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: external-tool
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f -ls

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
