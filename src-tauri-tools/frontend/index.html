<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>osu!mania Tail Maker - 外部工具</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: #1a1a2e;
        color: #eee;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        text-align: center;
        padding: 40px;
      }

      h1 {
        font-size: 24px;
        margin-bottom: 30px;
        color: #b76cf1;
      }

      .btn {
        padding: 12px 32px;
        font-size: 16px;
        background: linear-gradient(135deg, #b76cf1, #ff66aa);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 20px rgba(183, 108, 241, 0.4);
      }

      .result {
        margin-top: 20px;
        font-size: 18px;
        color: #44ee88;
        min-height: 27px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>osu!mania Tail Maker</h1>
      <button class="btn" id="greetBtn">点击测试</button>
      <div class="result" id="result"></div>
    </div>

    <script>
      const { invoke } = window.__TAURI__.core;

      document.getElementById('greetBtn').addEventListener('click', async () => {
        try {
          const message = await invoke('greet');
          document.getElementById('result').textContent = message;
        } catch (e) {
          document.getElementById('result').textContent = 'Error: ' + e;
        }
      });
    </script>
  </body>
</html>
