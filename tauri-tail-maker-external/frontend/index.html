<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>osu!mania Tail Maker - 外部工具</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
  </head>
  <body>
    <div class="container">
      <div class="panel-stripe"></div>
      <header class="panel-header">
        <div class="header-left">
          <div class="tool-icon-wrap">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M7.5 1.5L3 6l4.5 4.5L12 6 7.5 1.5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" />
              <path d="M3 12l4.5 4.5L12 12" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" />
              <circle cx="14" cy="4" r="2.5" stroke="currentColor" stroke-width="1.2" />
              <path d="M14 2.5v3M12.5 4h3" stroke="currentColor" stroke-width="1" stroke-linecap="round" />
            </svg>
          </div>
          <div class="header-text">
            <h2 class="panel-title">osu!mania Tail Maker External Tool</h2>
            <span class="panel-subtitle">External Tool</span>
          </div>
        </div>
        <button id="github-link" class="github-link" title="GitHub" type="button">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
          </svg>
        </button>
      </header>

      <main class="panel-body">
        <div class="desc-card">
          <p class="desc-text">
            一键修改 osu!mania 皮肤面尾投的长度，切换预设样式。此操作会将原始文件备份到 _backup 文件夹。
          </p>
        </div>

        <div class="config-group">
          <!-- 模式选择 -->
          <div class="field">
            <label class="field-label">修复模式</label>
            <div class="radio-cards" id="mode-radios">
              <label class="radio-card active" data-mode="lazer">
                <div class="radio-dot"><div class="radio-dot-inner"></div></div>
                <div class="radio-content">
                  <span class="radio-title">Lazer</span>
                  <span class="radio-desc">拉伸到 ColumnWidth×1.6 32800。</span>
                </div>
              </label>
              <label class="radio-card" data-mode="stable">
                <div class="radio-dot"><div class="radio-dot-inner"></div></div>
                <div class="radio-content">
                  <span class="radio-title">Stable</span>
                  <span class="radio-desc">仅修改投长度。</span>
                </div>
              </label>
            </div>
          </div>

          <!-- Key/KeyD 修复列表（仅 Lazer） -->
          <div class="field hidden" id="keyd-section">
            <label class="field-label">Key/KeyD 修复</label>
            <div id="keyd-list"></div>
            <span class="field-hint">勾选需要修复的 Key/KeyD 图片。仅在 Lazer 模式下生效。</span>
          </div>

          <!-- 预设替换（按 stem） -->
          <div class="field hidden" id="preset-section">
            <label class="field-label">用预设替换现有图片</label>
            <div id="preset-stem-list"></div>
            <span class="field-hint">为每个面尾图片选择预设替换。</span>
          </div>

          <!-- 键数 + 投长度 -->
          <div class="field">
            <label class="field-label">修改投长度</label>
            <div id="keys-throw-list"></div>
            <span class="field-hint">勾选键数并输入目标投长度。</span>
          </div>

          <!-- 执行 -->
          <div class="field">
            <button type="button" class="btn btn-primary btn-full" id="convert-btn">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
              <span>转换</span>
            </button>
          </div>
        </div>

        <div class="log-section">
          <div class="log-header">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <rect x="1" y="1" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.1" />
              <path d="M3.5 4h5M3.5 6h3M3.5 8h4" stroke="currentColor" stroke-width="0.9" stroke-linecap="round" />
            </svg>
            <span>日志</span>
          </div>
          <div class="log-content" id="log-content">
            <div class="log-empty">
              <span class="log-empty-icon">~</span>
              <span>等待操作...</span>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
